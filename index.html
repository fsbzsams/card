        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, Helvetica, Arial, sans-serif;
            background: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            justify-content: center;
            align-items: flex-start;
            min-height: 100vh;
            padding: 20px;
            text-align: center;
        }

        .card {
            max-width: 400px;
            width: 100%;
            background: #1a1a1a;
            border-radius: 20px;
            padding: 21px 20px 22px;
        }

        .lang-switch {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 8px;
        }

        .lang-flag {
            font-size: 26px;
            cursor: pointer;
            transition: opacity 0.25s;
            line-height: 1;
            background: none;
            border: none;
            padding: 0;
            opacity: 0.35;
            filter: grayscale(100%);
        }

        .lang-flag.active {
            opacity: 1;
            filter: grayscale(0%);
        }

        .avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            object-fit: cover;
            border: 3px solid #c9a96e;
            margin-bottom: 8px;
            background: #2a2a2a;
            cursor: pointer;
            transition: opacity 0.2s;
        }

        .avatar:active {
            opacity: 0.8;
        }

        .name {
            font-size: 26px;
            font-weight: 700;
            color: #f0f0f0;
            margin-bottom: 4px;
            letter-spacing: 0.3px;
            display: none;
        }

        .role {
            font-size: 15px;
            font-weight: 700;
            color: #c9a96e;
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .resume {
            text-align: left;
            font-size: 15px;
            line-height: 1.7;
            color: #cccccc;
            background: #222222;
            border-radius: 14px;
            padding: 18px 16px;
            margin-bottom: 16px;
            border-left: 3px solid #c9a96e;
        }

        .resume ul {
            list-style: none;
            padding-left: 0;
            margin: 0;
        }

        .resume ul li {
            padding-left: 1.4em;
            position: relative;
            margin-bottom: 10px;
            font-size: 15px;
            line-height: 1.7;
        }

        .resume ul li:last-child {
            margin-bottom: 0;
        }

        .resume ul li::before {
            content: "•";
            position: absolute;
            left: 0;
            color: #c9a96e;
            font-weight: bold;
        }

        .contact-notice {
            font-size: 14px;
            color: #c9a96e;
            margin-bottom: 18px;
            font-weight: 500;
            letter-spacing: 0.3px;
        }

        .qr-section {
            margin-top: 0;
        }

        .qr-code {
            width: 136px;
            height: 136px;
            border-radius: 12px;
            border: 3px solid #c9a96e;
            margin-bottom: 12px;
            background: #fff;
            padding: 6px;
            cursor: pointer;
            transition: opacity 0.2s;
            display: block;
            margin-left: auto;
            margin-right: auto;
        }

        .qr-code:active {
            opacity: 0.8;
        }

        .session-id-wrapper {
            position: relative;
            width: 136px;
            margin: 0 auto 12px;
            min-height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .session-id {
            font-size: 11px;
            color: #aaa;
            word-break: break-all;
            line-height: 1.4;
            cursor: pointer;
            padding: 8px;
            border-radius: 8px;
            transition: background 0.2s, opacity 0.2s;
            font-weight: 500;
            width: 100%;
            text-align: center;
        }

        .session-id:active {
            background: #2a2a2a;
        }

        .session-id.hidden {
            opacity: 0;
            pointer-events: none;
        }

        .copy-toast {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #c9a96e;
            color: #0d0d0d;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 600;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
        }

        .copy-toast.show {
            opacity: 1;
        }

        .details-toggle {

            width: 100%;
            padding: 14px;
            background: #2a2a2a;
            color: #c9a96e;
            border: 1px solid #444;
            border-radius: 12px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 0;
        }

        .details-toggle:active {
            background: #333;
        }

        .details-content {
            max-height: 0;
            overflow: hidden;

            margin-top: 0;
        }

        .details-content.open {
            max-height: 9000px;
            margin-top: 12px;
        }

            font-size: 15px;
            line-height: 1.7;

            margin-bottom: 0;

            position: absolute;
            left: 0;
            color: #c9a96e;
            font-weight: bold;

        .detail-card ul.algorithm-list li:nth-child(3)::before { content: "3."; }

            list-style: none;
            padding-left: 0;
            margin: 0;

            position: relative;
            margin-bottom: 10px;
            font-size: 15px;
            line-height: 1.7;

        .detail-card ul.method-list li:last-child {
            margin-bottom: 0;

            content: "•";
            position: absolute;
            left: 0;
            color: #c9a96e;

            position: relative;
            margin-bottom: 8px;
            font-size: 15px;
            line-height: 1.7;

            content: "•";
            position: absolute;
            left: 0;
            color: #c9a96e;
            font-weight: bold;

        .modal {

            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            justify-content: center;
            align-items: center;
            padding: 20px;

            max-height: 65vh;
            border-radius: 16px;
            border: 2px solid #c9a96e;
            background: #fff;
            padding: 8px;

            border: 3px solid #c9a96e;

            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: #0d0d0d;
            color: #f0f0f0;
            padding: 40vh 20px 0;
            text-align: center;
            z-index: 9999;
            font-size: 18px;

</head>

            /* --- DOM элементы --- */
            const nameText = document.getElementById('name-text');
            const roleText = document.getElementById('role-text');
            const resumeText = document.getElementById('resume-text');
            const contactNotice = document.getElementById('contact-notice');
            const detailsBtn = document.getElementById('details-btn');
            const detailsContent = document.getElementById('details-content');
            const sessionIdEl = document.getElementById('sessionId');
            const copyToastEl = document.getElementById('copyToast');
            const qrModal = document.getElementById('qrModal');
            const avatarModal = document.getElementById('avatarModal');
            const langFlags = document.querySelectorAll('.lang-flag');

            /* --- Функции --- */
            function renderDetailsContent() {
                const cards = data[currentLang].detailsCards;
                let html = '';
                cards.forEach(card => {
                    html += `
                        <div class="detail-card">
                            <h3>${card.title}</h3>
                            ${card.content}
                        </div>
                    `;
                });
                detailsContent.innerHTML = html;
            }

            window.setLang = function(lang) {
                currentLang = lang;
                
                langFlags.forEach(flag => {
                    flag.classList.remove('active');
                });
                
                const activeFlag = document.querySelector(`.lang-flag[onclick="setLang('${lang}')"]`);
                if (activeFlag) {
                    activeFlag.classList.add('active');
                }

                const d = data[lang];
                nameText.textContent = d.name;
                roleText.textContent = d.role;
                /* Генерируем список с точками-маркерами */
                let resumeHtml = '<ul>';
                d.resume.forEach(p => {
                    resumeHtml += `<li>${p}</li>`;
                });
                resumeHtml += '</ul>';
                resumeText.innerHTML = resumeHtml;
                contactNotice.textContent = d.contact;
                detailsBtn.textContent = detailsOpen ? d.detailsBtnClose : d.detailsBtn;
                renderDetailsContent();
            };

            window.toggleDetails = function() {
                detailsOpen = !detailsOpen;
                const d = data[currentLang];
                if (detailsOpen) {
                    detailsContent.classList.add('open');
                    detailsBtn.textContent = d.detailsBtnClose;
                } else {
                    detailsContent.classList.remove('open');
                    detailsBtn.textContent = d.detailsBtn;
                }
            };

            window.openModal = function() {
                qrModal.classList.add('show');
            };

            window.closeModal = function() {
                qrModal.classList.remove('show');
            };

            window.openAvatarModal = function() {
                avatarModal.classList.add('show');
            };

            window.closeAvatarModal = function() {
                avatarModal.classList.remove('show');
            };

            window.copySession = function() {
                const id = 'FSBZSAMS';
                navigator.clipboard.writeText(id).then(() => {
                    copyToastEl.textContent = data[currentLang].copied;
                    copyToastEl.classList.add('show');
                    sessionIdEl.classList.add('hidden');
                    
                    setTimeout(() => {
                        copyToastEl.classList.remove('show');
                        sessionIdEl.classList.remove('hidden');
                    }, 1000);
                }).catch(() => {
                    // Ничего не делаем при неудаче
                });
            };

            /* --- Стартовая инициализация --- */
            setLang('en');
            renderDetailsContent();
        })();
    </script>
</body>
</html>
